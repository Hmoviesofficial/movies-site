<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES PRO</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
}

header {
  text-align: center;
  padding: 15px;
}

#search {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

h2 {
  padding-left: 10px;
}

.movies {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.movie {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.movie img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.movie p {
  text-align: center;
  padding: 8px;
}

/* popup */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup iframe {
  width:90%;
  height:300px;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🎬 H.MOVIES PRO</h1>
<input id="search" placeholder="Search movies...">
</header>

<h2>🔥 Trending</h2>
<div id="movies" class="movies"></div>

<div id="popup" class="popup">
  <span class="close" onclick="closePopup()">❌</span>
  <iframe id="video" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
const API_KEY = "f409489a42d61f514484fa959f76fec7";
const IMG = "https://image.tmdb.org/t/p/w500";

const moviesDiv = document.getElementById("movies");
const search = document.getElementById("search");

async function loadMovies(query=""){
  let url;

  if(query){
    url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}`;
  } else {
    url = `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`;
  }

  try{
    const res = await fetch(url);
    const data = await res.json();

    moviesDiv.innerHTML = "";

    data.results.forEach(movie => {
      const img = movie.poster_path 
        ? IMG + movie.poster_path 
        : "https://via.placeholder.com/300x450?text=No+Image";

      const div = document.createElement("div");
      div.className = "movie";

      div.innerHTML = `
        <img src="${img}">
        <p>${movie.title}</p>
      `;

      div.onclick = () => openTrailer(movie.title);

      moviesDiv.appendChild(div);
    });

  }catch(err){
    moviesDiv.innerHTML = "<p style='color:red'>API Error (VPN try karo)</p>";
  }
}

function openTrailer(name){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("video").src =
    "https://www.youtube.com/embed?listType=search&list=" + name + " trailer";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
  document.getElementById("video").src = "";
}

/* load trending */
loadMovies();

/* search */
search.addEventListener("input", () => {
  loadMovies(search.value);
});
</script>

</body>
</html>
