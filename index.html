<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES</title>

<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#000;
  color:#fff;
  overflow-x: hidden;
}

/* Header & Menu Icon */
.top-bar {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  position: relative;
}

.menu-icon {
  font-size: 30px;
  cursor: pointer;
  z-index: 1001;
}

.header-title {
  flex-grow: 1;
  font-family: 'Monoton', cursive;
  font-size: 35px;
  text-align: center;
  margin: 0;
  text-transform: uppercase;
}
.header-title span.h { color: #ffffff; text-shadow: 0 0 10px #fff; } 
.header-title span.m { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

/* Side Navigation Drawer */
.sidebar {
  height: 100%;
  width: 0;
  position: fixed;
  z-index: 1000;
  top: 0;
  left: 0;
  background-color: #111;
  overflow-x: hidden;
  transition: 0.5s;
  padding-top: 80px;
  border-right: 1px solid #ff0000;
}

.sidebar a {
  padding: 15px 25px;
  text-decoration: none;
  font-size: 18px;
  color: #fff;
  display: block;
  transition: 0.3s;
  border-bottom: 1px solid #222;
}

.sidebar a:hover {
  background: #ff0000;
  color: white;
}

.sidebar .close-btn {
  position: absolute;
  top: 20px;
  right: 25px;
  font-size: 36px;
  cursor: pointer;
}

/* Main Content Styles */
.search {
  width:85%;
  margin:10px auto;
  display: block;
  padding:12px 20px;
  border-radius:30px;
  border: 1px solid #ffffff;
  background: #111;
  color: #fff;
  outline: none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:10px;
}

.movie {
  background:#111;
  border-radius:12px;
  overflow:hidden;
  border: 1px solid #222;
  display: flex;
  flex-direction: column;
}

.movie img { width:100%; cursor: pointer; }
.movie h3 { padding:8px; font-size:13px; margin: 0; text-align: center; flex-grow: 1; }

.download-btn {
  background: #ff0000;
  color: white;
  border: none;
  padding: 12px;
  font-weight: bold;
  cursor: pointer;
  font-size: 11px;
}

.load-more-container { text-align: center; padding: 20px; }
.load-more-btn {
  background: transparent;
  color: #fff;
  border: 2px solid #ff0000;
  padding: 10px 30px;
  border-radius: 25px;
  cursor: pointer;
}
</style>

</head>
<body>

<div id="mySidebar" class="sidebar">
  <span class="close-btn" onclick="closeNav()">&times;</span>
  <a href="#" onclick="loadMovies('trending'); closeNav()">🔥 Trending</a>
  <a href="#" onclick="loadByCategory(16); closeNav()">Anime</a>
  <a href="#" onclick="loadByCategory(28); closeNav()">Action</a>
  <a href="#" onclick="loadByCategory(35); closeNav()">Comedy</a>
  <a href="#" onclick="loadByCategory(27); closeNav()">Horror</a>
  <a href="#" onclick="loadByCategory(18); closeNav()">Drama</a>
  <a href="#" onclick="loadByCategory(878); closeNav()">Sci-Fi</a>
</div>

<div class="top-bar">
  <div class="menu-icon" onclick="openNav()">&#9776;</div>
  <h1 class="header-title"><span class="h">H.</span><span class="m">MOVIES</span></h1>
</div>

<input class="search" placeholder="Search movies..." id="search">

<div class="grid" id="movies"></div>

<div class="load-more-container">
  <button class="load-more-btn" onclick="loadMoreMovies()">LOAD MORE</button>
</div>

<script>
const API_KEY = "f409489a42d61f514484fa959f76fec7";
const IMG = "https://image.tmdb.org/t/p/w500";
const moviesDiv = document.getElementById("movies");
const searchInput = document.getElementById("search");

let currentPage = 1;
let currentGenre = null;
let isSearch = false;

// Sidebar Controls
function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

// Initial Load
loadMovies('trending');

function loadMovies(type) {
  currentPage = 1; currentGenre = null; isSearch = false;
  fetchMovies(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}&page=${currentPage}`, true);
}

function loadByCategory(genreId) {
  currentPage = 1; currentGenre = genreId; isSearch = false;
  fetchMovies(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&page=${currentPage}`, true);
}

function loadMoreMovies() {
  currentPage++;
  let url = currentGenre 
    ? `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${currentGenre}&page=${currentPage}`
    : `https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}&page=${currentPage}`;
  if(isSearch) url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${searchInput.value}&page=${currentPage}`;
  fetchMovies(url, false);
}

function fetchMovies(url, clearGrid) {
  fetch(url).then(res => res.json()).then(data => {
    if(clearGrid) moviesDiv.innerHTML = "";
    showMovies(data.results);
  });
}

function showMovies(movies){
  movies.forEach(movie => {
    if(!movie.poster_path) return;
    const div = document.createElement("div");
    div.classList.add("movie");
    div.innerHTML = `
      <img src="${IMG + movie.poster_path}" onclick="openMovie(${movie.id})">
      <h3>${movie.title}</h3>
      <button class="download-btn" onclick="goToDownload('${movie.title}')">📥 DOWNLOAD NOW</button>
    `;
    moviesDiv.appendChild(div);
  });
}

searchInput.addEventListener("keyup", () => {
  let q = searchInput.value;
  if(q.length > 2) {
    isSearch = true; currentPage = 1;
    fetchMovies(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}&page=${currentPage}`, true);
  }
});

function openMovie(id){
  fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`)
  .then(res => res.json()).then(data => {
    let vid = data.results.find(v => v.type === "Trailer");
    if(vid) window.open(`https://www.youtube.com/watch?v=${vid.key}`);
    else alert("Trailer not available");
  });
}

function goToDownload(title) {
  const query = encodeURIComponent(title);
  window.open(`https://new7.hdhub4u.fo/?s=${query}`, '_blank');
}
</script>

</body>
</html>
