<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES PRO</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
}

h1 {
  padding: 20px;
}

.search-box {
  padding: 0 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

.movies {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 20px;
}

.movie {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.movie img {
  width: 100%;
}

.movie h3 {
  padding: 10px;
  font-size: 14px;
}

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.popup iframe {
  width: 90%;
  height: 200px;
}

button {
  margin: 10px;
  padding: 10px;
}
</style>

</head>
<body>

<h1>H.MOVIES PRO</h1>

<div class="search-box">
  <input type="text" id="search" placeholder="Search movies...">
</div>

<h2 style="padding-left:20px;">🔥 Trending</h2>

<div class="movies" id="movies"></div>

<div class="popup" id="popup">
  <iframe id="trailer"></iframe>
  <button onclick="closePopup()">Close</button>
</div>

<script>
const API_KEY = "f409489a42d61f514484fa959f76fec7";
const IMG_URL = "https://image.tmdb.org/t/p/w500";

const moviesDiv = document.getElementById("movies");

// LOAD TRENDING
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`)
.then(res => res.json())
.then(data => {
  showMovies(data.results);
});

// SHOW MOVIES
function showMovies(movies){
  moviesDiv.innerHTML = "";
  movies.forEach(movie => {
    const div = document.createElement("div");
    div.classList.add("movie");

    div.innerHTML = `
      <img src="${IMG_URL + movie.poster_path}">
      <h3>${movie.title}</h3>
    `;

    div.onclick = () => getTrailer(movie.id);

    moviesDiv.appendChild(div);
  });
}

// TRAILER FUNCTION
function getTrailer(id){
  fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`)
  .then(res => res.json())
  .then(data => {
    const video = data.results.find(v => v.type === "Trailer");
    if(video){
      document.getElementById("popup").style.display = "flex";
      document.getElementById("trailer").src =
        "https://www.youtube.com/embed/" + video.key;
    } else {
      alert("Trailer not found");
    }
  });
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
  document.getElementById("trailer").src = "";
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function(){
  let value = this.value;

  fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${value}`)
  .then(res => res.json())
  .then(data => showMovies(data.results));
});
</script>

</body>
</html>
