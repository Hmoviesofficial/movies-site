<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.Movies Pro</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: #fff;
    font-family: Arial;
}

header {
    padding: 20px;
    background: linear-gradient(to right, black, #111);
}

h1 {
    color: red;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    margin-top: 10px;
    outline: none;
}

.container {
    padding: 15px;
}

.movies {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.movie {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    cursor: pointer;
}

.movie img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    transition: 0.3s;
}

.movie:hover img {
    transform: scale(1.1);
}

.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;
    background: linear-gradient(transparent, black);
}

.overlay h3 {
    margin: 0;
    font-size: 14px;
}

.overlay button {
    margin-top: 5px;
    padding: 5px 10px;
    border: none;
    border-radius: 6px;
    background: red;
    color: white;
}

/* Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup iframe {
    width: 90%;
    height: 50%;
}

.close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 25px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>🔥 H.MOVIES PRO</h1>
    <input type="text" id="search" placeholder="Search movies...">
</header>

<div class="container">
    <h2>Trending</h2>
    <div id="movies" class="movies"></div>
</div>

<!-- Trailer Popup -->
<div class="popup" id="popup">
    <span class="close" onclick="closePopup()">❌</span>
    <iframe id="video" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
const API_KEY = "f409489a42d61f514484fa959f76fec7";
const IMG_URL = "https://image.tmdb.org/t/p/w500";
const BASE_URL = "https://api.themoviedb.org/3";

const moviesContainer = document.getElementById("movies");
const searchInput = document.getElementById("search");

// Load movies
function loadMovies() {
    fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}`)
    .then(res => res.json())
    .then(data => showMovies(data.results));
}

// Show movies
function showMovies(movies) {
    moviesContainer.innerHTML = "";

    movies.forEach(movie => {
        const div = document.createElement("div");
        div.classList.add("movie");

        div.innerHTML = `
            <img src="${IMG_URL + movie.poster_path}">
            <div class="overlay">
                <h3>${movie.title}</h3>
                <button onclick="playTrailer('${movie.title}')">▶ Trailer</button>
            </div>
        `;

        moviesContainer.appendChild(div);
    });
}

// Play trailer inside popup
function playTrailer(title) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("video").src =
        `https://www.youtube.com/embed?listType=search&list=${title} trailer`;
}

// Close popup
function closePopup() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("video").src = "";
}

// Search
searchInput.addEventListener("keyup", () => {
    const query = searchInput.value;

    if (query.length > 2) {
        fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}`)
        .then(res => res.json())
        .then(data => showMovies(data.results));
    } else {
        loadMovies();
    }
});

// Start
loadMovies();
</script>

</body>
</html>
