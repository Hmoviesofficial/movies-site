<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES PRO</title>

<style>
body {margin:0;background:#000;color:#fff;font-family:Arial;}
header{text-align:center;padding:15px;}
#search{width:90%;padding:10px;border-radius:10px;border:none;}
.movies{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.movie{background:#111;border-radius:10px;overflow:hidden;cursor:pointer;}
.movie img{width:100%;}
.movie p{text-align:center;font-size:14px;}
</style>
</head>

<body>

<header>
<h1>🎬 H.MOVIES PRO</h1>
<input id="search" placeholder="Search movies...">
</header>

<h2 style="padding-left:10px;">🔥 Trending</h2>
<div id="movies" class="movies"></div>

<script>
const API_KEY = "f409489a42d61f514484fa959f76fec7";
const moviesDiv = document.getElementById("movies");
const search = document.getElementById("search");

async function getMovies(url){
  const res = await fetch(url);
  const data = await res.json();
  showMovies(data.results);
}

function showMovies(movies){
  moviesDiv.innerHTML = "";

  movies.forEach(movie => {

    const imgURL = movie.poster_path 
      ? "https://image.tmdb.org/t/p/w500" + movie.poster_path
      : "https://via.placeholder.com/300x450?text=No+Image";

    const div = document.createElement("div");
    div.classList.add("movie");

    div.innerHTML = `
      <img src="${imgURL}">
      <p>${movie.title}</p>
    `;

    div.onclick = () => {
      window.open(
        "https://www.youtube.com/results?search_query=" + movie.title + " trailer",
        "_blank"
      );
    };

    moviesDiv.appendChild(div);
  });
}

getMovies(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`);

search.addEventListener("input", () => {
  if(search.value.length > 2){
    getMovies(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${search.value}`);
  } else {
    getMovies(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`);
  }
});
</script>

</body>
</html>
