<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.MOVIES</title>

<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#000;
  color:#fff;
}

/* Stylish Neon Header */
.header-title {
  padding: 20px 10px;
  font-family: 'Monoton', cursive;
  font-size: 40px;
  text-align: center;
  margin: 0;
  text-transform: uppercase;
}
.header-title span.h { color: #ffffff; text-shadow: 0 0 10px #fff; } 
.header-title span.m { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

.search {
  width:85%;
  margin:10px auto;
  display: block;
  padding:12px 20px;
  border-radius:30px;
  border: 1px solid #ffffff;
  background: #111;
  color: #fff;
  outline: none;
  font-size: 16px;
}

/* Category Buttons */
.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
  scrollbar-width: none;
}
.categories::-webkit-scrollbar { display: none; }

.cat-btn {
  background: #111;
  color: #fff;
  border: 1px solid #333;
  padding: 8px 18px;
  border-radius: 20px;
  white-space: nowrap;
  cursor: pointer;
  font-size: 13px;
  transition: 0.3s;
}
.cat-btn.active {
  background: #ffffff;
  color: #000;
  font-weight: bold;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:10px;
}

.movie {
  background:#111;
  border-radius:12px;
  overflow:hidden;
  border: 1px solid #222;
  display: flex;
  flex-direction: column;
}

.movie img {
  width:100%;
  cursor: pointer;
}

.movie h3 {
  padding:8px;
  font-size:13px;
  margin: 0;
  flex-grow: 1;
  text-align: center;
  font-weight: 400;
}

.download-btn {
  background: #ff0000;
  color: white;
  border: none;
  padding: 12px;
  font-weight: bold;
  cursor: pointer;
  font-size: 11px;
}

/* Load More Button */
.load-more-container {
  text-align: center;
  padding: 20px;
}
.load-more-btn {
  background: transparent;
  color: #fff;
  border: 2px solid #ff0000;
  padding: 10px 30px;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
.load-more-btn:hover {
  background: #ff0000;
}
</style>

</head>
<body>

<h1 class="header-title"><span class="h">H.</span><span class="m">MOVIES</span></h1>

<input class="search" placeholder="Search movies..." id="search">

<div class="categories">
  <button class="cat-btn active" id="btn-trending" onclick="loadMovies('trending', this)">🔥 Trending</button>
  <button class="cat-btn" onclick="loadByCategory(16, this)">Anime</button>
  <button class="cat-btn" onclick="loadByCategory(28, this)">Action</button>
  <button class="cat-btn" onclick="loadByCategory(35, this)">Comedy</button>
  <button class="cat-btn" onclick="loadByCategory(27, this)">Horror</button>
  <button class="cat-btn" onclick="loadByCategory(18, this)">Drama</button>
</div>

<div class="grid" id="movies"></div>

<div class="load-more-container">
  <button class="load-more-btn" id="loadMore" onclick="loadMoreMovies()">LOAD MORE</button>
</div>

<script>

const API_KEY = "f409489a42d61f514484fa959f76fec7";
const IMG = "https://image.tmdb.org/t/p/w500";
const moviesDiv = document.getElementById("movies");
const searchInput = document.getElementById("search");

let currentPage = 1;
let currentGenre = null;
let isSearch = false;

// Initial Load
loadMovies('trending');

function loadMovies(type, btn) {
  currentPage = 1;
  currentGenre = null;
  isSearch = false;
  if(btn) updateActiveBtn(btn);
  
  fetchMovies(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}&page=${currentPage}`, true);
}

function loadByCategory(genreId, btn) {
  currentPage = 1;
  currentGenre = genreId;
  isSearch = false;
  updateActiveBtn(btn);

  fetchMovies(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&page=${currentPage}`, true);
}

function loadMoreMovies() {
  currentPage++;
  let url = currentGenre 
    ? `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${currentGenre}&page=${currentPage}`
    : `https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}&page=${currentPage}`;
    
  if(isSearch) {
    url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${searchInput.value}&page=${currentPage}`;
  }

  fetchMovies(url, false);
}

function fetchMovies(url, clearGrid) {
  fetch(url)
  .then(res => res.json())
  .then(data => {
    if(clearGrid) moviesDiv.innerHTML = "";
    showMovies(data.results);
  });
}

function showMovies(movies){
  movies.forEach(movie => {
    if(!movie.poster_path) return;
    const div = document.createElement("div");
    div.classList.add("movie");

    div.innerHTML = `
      <img src="${IMG + movie.poster_path}" onclick="openMovie(${movie.id})">
      <h3>${movie.title}</h3>
      <button class="download-btn" onclick="goToDownload('${movie.title}')">📥 DOWNLOAD NOW</button>
    `;
    moviesDiv.appendChild(div);
  });
}

function updateActiveBtn(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Search
searchInput.addEventListener("keyup", () => {
  let q = searchInput.value;
  if(q.length > 2) {
    isSearch = true;
    currentPage = 1;
    fetchMovies(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}&page=${currentPage}`, true);
  }
});

function openMovie(id){
  fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`)
  .then(res => res.json())
  .then(data => {
    let vid = data.results.find(v => v.type === "Trailer");
    if(vid) window.open(`https://www.youtube.com/watch?v=${vid.key}`);
    else alert("Trailer not available");
  });
}

function goToDownload(title) {
  const query = encodeURIComponent(title);
  const targetUrl = `https://new7.hdhub4u.fo/?s=${query}`;
  window.open(targetUrl, '_blank');
}

</script>

</body>
</html>
